services:
  postgres-dev:
    image: postgres:16
    container_name: expenseflow-postgres-dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - expenseflow_postgres_dev_data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16
    container_name: expenseflow-postgres-test
    environment:
      POSTGRES_DB: ${TEST_DB_NAME}
      POSTGRES_USER: ${TEST_DB_USER}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD}
    ports:
      - "${TEST_DB_PORT}:5432"
    volumes:
      - expenseflow_postgres_test_data:/var/lib/postgresql/data

volumes:
  expenseflow_postgres_dev_data:
  expenseflow_postgres_test_data: